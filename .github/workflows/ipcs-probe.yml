name: IPCS probe (temporary)
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check listing order at both ends
        run: |
          UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36'
          for u in 'issue_briefs.php' 'issue_briefs.php?pageno=27' 'special_reports.php?pageno=23' 'ipcs_books_reviews.php?pageno=15' 'discussion_reports.php?pageno=5' 'research_paper.php?pageno=3' 'commentaries.php?pageno=585'; do
            echo "--- $u"
            curl -A "$UA" -s --max-time 40 "https://www.ipcs.org/$u" | grep -oE '[0-9]{1,2} [A-Z][a-z]{2}, [0-9]{4}' | head -3
          done
