name: Build PIB + News On AIR + Current Affairs RSS feeds

on:
  schedule:
    # Press releases and AIR news move fast; the rest are infrequent. Hourly covers both.
    - cron: "17 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - pib_feed.py
      - newsonair_feed.py
      - visioniaspt365.py
      - meca.py
      - archive_pdfs.py
      - .github/workflows/build-feeds.yml

permissions:
  contents: write   # archive_pdfs.py uploads PDFs as release assets
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build feeds
        env:
          PIB_WORKERS: "10"
          # Merge with the already-published feeds so history is retained beyond
          # the scan window. Each feed reads <base>/<key>/feed.xml.
          PIB_PUBLISHED_BASE_URL: "${{ steps.pages.outputs.base_url }}"
        run: python pib_feed.py

      - name: Build News On AIR feeds
        env:
          NOA_WORKERS: "10"
          # Same history-retention trick: read each already-published feed from
          # <base>/<key>/feed.xml and merge, so feeds grow past the source window.
          NOA_PUBLISHED_BASE_URL: "${{ steps.pages.outputs.base_url }}"
        run: python newsonair_feed.py

      - name: Build Vision IAS PT/Mains 365 feeds
        env:
          VIS_PUBLISHED_BASE_URL: "${{ steps.pages.outputs.base_url }}"
          # Point feed items at the archived PDFs on the release, and write the
          # archive manifests consumed by archive_pdfs.py.
          VIS_ARCHIVE_MODE: archive
          VIS_ARCHIVE_BASE_URL: "https://github.com/${{ github.repository }}/releases/download/pdf-archive"
        run: python visioniaspt365.py

      - name: Build Made Easy + NextIAS current-affairs feeds
        env:
          MECA_PUBLISHED_BASE_URL: "${{ steps.pages.outputs.base_url }}"
          MECA_ARCHIVE_MODE: archive
          MECA_ARCHIVE_BASE_URL: "https://github.com/${{ github.repository }}/releases/download/pdf-archive"
        run: python meca.py

      - name: Mirror PDFs to the archive release
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: python archive_pdfs.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
